name: Agility
version: 0.1.0.0
synopsis: A dashboard for anything
homepage: massentropy.com
license: MIT
license-file: LICENSE
author: Mattias Högnäs
maintainer: mattias.hognas@gmail.com
category: System

extra-doc-files:
  - CHANGELOG.md

language: GHC2021

ghc-options: -Wall

executables:
  Agility:
    main: Main.hs
    source-dirs: app
    ghc-options:
      - -threaded
      - -rtsopts
    dependencies:
      - base >= 4.20.2.0
      - brick >= 2.9
      - vty >= 6.4
      - aeson >= 2.2.3.0
      - time >= 1.12.2
      - directory >= 1.3.8.5
      - text >= 2.1.3
      - containers >= 0.7
      - unordered-containers >= 0.2.20.1
      - bytestring >= 0.12.2.0
      - http-conduit >= 2.3.9.1
      - process >= 1.6.26.0
